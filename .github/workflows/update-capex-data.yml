name: Update Capex Data

on:
  schedule:
    # Daily at 6 AM UTC (SEC data changes infrequently)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch capex data
        run: node scripts/fetch_capex_data.mjs
        working-directory: capex

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add capex/public/capex-data.json
          git diff --cached --quiet || (git commit -m "Update capex data" && git push)
