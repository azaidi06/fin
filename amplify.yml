version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node -v
        - npm ci --prefix war-markets-react
        - npm ci --prefix tech-spend
    build:
      commands:
        # Refresh dynamic data (best-effort; deploy should not fail on data refresh)
        - (cd war-markets-react && node scripts/fetch_market_data.mjs) || echo "Market data fetch skipped"
        - (cd tech-spend && node scripts/fetch_tech_spend_data.mjs) || echo "Tech-spend data fetch skipped"
        # Build both sub-apps
        - npm run build --prefix war-markets-react
        - npm run build --prefix tech-spend
    postBuild:
      commands:
        - mkdir -p _site/tech-spend
        - cp -r war-markets-react/dist/* _site/
        - cp -r tech-spend/dist/* _site/tech-spend/
        # Redirect old /capex/* paths to /tech-spend/* for permalinks
        - printf "/capex/*  /tech-spend/:splat  301\n" > _site/_redirects
  artifacts:
    baseDirectory: _site
    files:
      - '**/*'
  cache:
    paths:
      - war-markets-react/node_modules/**/*
      - tech-spend/node_modules/**/*
