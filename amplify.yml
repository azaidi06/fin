version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node -v
        - npm ci --prefix war-markets-react
        - npm ci --prefix capex
    build:
      commands:
        # Refresh dynamic data (best-effort; deploy should not fail on data refresh)
        - (cd war-markets-react && node scripts/fetch_market_data.mjs) || echo "Market data fetch skipped"
        - (cd capex && node scripts/fetch_capex_data.mjs) || echo "Capex data fetch skipped"
        # Build both sub-apps
        - npm run build --prefix war-markets-react
        - npm run build --prefix capex
    postBuild:
      commands:
        - mkdir -p _site/capex
        - cp -r war-markets-react/dist/* _site/
        - cp -r capex/dist/* _site/capex/
  artifacts:
    baseDirectory: _site
    files:
      - '**/*'
  cache:
    paths:
      - war-markets-react/node_modules/**/*
      - capex/node_modules/**/*
